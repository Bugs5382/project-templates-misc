name: Label Checker
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  Title_Checker:
    name: Check PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Check_SemVer_Labels:
    name: Check Semver labels
    runs-on: ubuntu-latest
    steps:
      - name: Check for Semver labels
        uses: danielchabr/pr-labels-checker@v3.3
        with:
          hasSome: breaking,enhancement,dependencies,refactor
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  Check_CC_Labels:
    name: Check conventional commits labels
    runs-on: ubuntu-latest
    steps:
      - uses: danielchabr/pr-labels-checker@v3.3
        with:
          hasSome: breaking,changed,deprecated,removed,security,dependencies,enhancement,bug,documentation
          githubToken: ${{ secrets.GITHUB_TOKEN }}
